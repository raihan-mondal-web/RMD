<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM Advanced Design Solutions</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: white; margin: 0; text-align: center; }
        .header { padding: 80px 20px; background: linear-gradient(135deg, #1e3a8a, #0b0e14); }
        h1 { font-size: 2.2rem; color: #60a5fa; margin: 0; }
        #popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .popup-content { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #60a5fa; max-width: 80%; }
        button { background: #60a5fa; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="popup">
        <div class="popup-content">
            <h3>Welcome to RM Advanced</h3>
            <p>Do you allow permission to view this 3D Portfolio?</p>
            <button onclick="document.getElementById('popup').style.display='none'">Allow & Enter</button>
        </div>
    </div>
    <div class="header">
        <h1>RM Advanced Design Solutions</h1>
        <p>Official Portfolio of Raihan Mondal</p>
    </div>
    <div style="padding: 50px;">
        <h2>Innovative 3D Designs Coming Soon...</h2>
        <p>Global Resources for Humanity</p>
    </div>
</body>
</html>
